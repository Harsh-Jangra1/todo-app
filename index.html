<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="Harsh Jangra">
    <meta name="description" content="A responsive To-Do List application built with HTML, CSS, and JavaScript.">
    <meta name="keywords" content="Todo App, Task Manager, HTML, CSS, JavaScript, Frontend Project">

    <title>To-Do List | Harsh Jangra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="./favicon.ico">

    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/animations.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">
</head>

<body data-theme="light">
    <main class="todo-app-container">
        <section class="todo-app" aria-label="To-Do Application">
            <header class="todo-header">
                <div class="logo">
                    <i class="fa-solid fa-list-check"></i>
                    <h1>To-Do List</h1>
                </div>

                <button type="button" class="theme-toggle" aria-label="Toggle theme" aria-pressed="false">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </header>

            <form class="todo-form" id="todo-form" novalidate>
                <div class="input-group">
                    <label class="sr-only" for="task-input">Task title</label>
                    <input type="text" id="task-input" placeholder="Enter a new task..." autocomplete="off" required>
                </div>

                <div class="form-options">
                    <label class="sr-only" for="priority">Task priority</label>
                    <select id="priority" aria-label="Task priority">
                        <option value="low">Low priority</option>
                        <option value="medium" selected>Medium priority</option>
                        <option value="high">High priority</option>
                    </select>

                    <label class="sr-only" for="due-date">Due date</label>
                    <input type="date" id="due-date" aria-label="Due date">
                </div>

                <button type="submit" class="add-task-btn">
                    <i class="fa-solid fa-plus"></i>
                    <span>Add Task</span>
                </button>
            </form>

            <section class="search-section">
                <label class="sr-only" for="search-task">Search tasks</label>
                <input type="search" id="search-task" placeholder="Search tasks...">
            </section>

            <section class="filter-section">
                <button type="button" class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
                <button type="button" class="filter-btn" data-filter="active" aria-pressed="false">Active</button>
                <button type="button" class="filter-btn" data-filter="completed" aria-pressed="false">Completed</button>
            </section>

            <section class="stats" aria-label="Task statistics">
                <article class="stat-card">
                    <h3>Total</h3>
                    <p id="total-tasks">0</p>
                </article>

                <article class="stat-card">
                    <h3>Completed</h3>
                    <p id="completed-tasks">0</p>
                </article>

                <article class="stat-card">
                    <h3>Pending</h3>
                    <p id="pending-tasks">0</p>
                </article>
            </section>

            <section class="task-section" aria-label="Task List">
                <ul id="task-list" class="task-list" aria-live="polite" aria-relevant="additions removals"></ul>
            </section>

            <section id="empty-state" class="empty-state" role="status" aria-live="polite" aria-atomic="true">
                <i class="fa-regular fa-folder-open"></i>
                <h2>No Tasks Yet</h2>
                <p>Start by adding your first task.</p>
            </section>

            <footer class="todo-footer">
                <p>Made with ❤️ <span>by</span> <strong>Harsh Jangra</strong></p>
            </footer>
        </section>
    </main>

    <script src="https://kit.fontawesome.com/59965007f8.js" crossorigin="anonymous"></script>

    <script src="./assets/js/storage.js"></script>
    <script src="./assets/js/utils.js"></script>
    <script src="./assets/js/ui.js"></script>
    <script src="./assets/js/events.js"></script>
    <script src="./assets/js/filters.js"></script>
    <script src="./assets/js/app.js"></script>

</body>

</html>
